name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS)
        if: matrix.args != ''
        run: rustup target add $(echo "${{ matrix.args }}" | sed 's/--target //')

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install cmake llvm

      - name: Install dependencies (macOS)
        if: contains(matrix.platform, 'macos')
        run: brew install cmake

      - name: Install frontend dependencies
        run: pnpm install

      - name: Pre-build Rust (Windows, creates DLLs)
        if: matrix.platform == 'windows-latest'
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Download ONNX Runtime DLL (Windows)
        if: matrix.platform == 'windows-latest'
        shell: python
        run: |
          import urllib.request, lzma, tarfile, os, glob
          url = "https://cdn.pyke.io/0/pyke:ort-rs/ms@1.24.2/x86_64-pc-windows-msvc.tar.lzma2"
          dest = os.path.join("src-tauri", "target", "release")
          print(f"Downloading {url}")
          data, _ = urllib.request.urlretrieve(url)
          with open(data, "rb") as f:
              raw = f.read()
          print(f"Decompressing {len(raw)} bytes (lzma)")
          decompressed = lzma.decompress(raw)
          tar_path = os.path.join(os.environ["TEMP"], "ort.tar")
          with open(tar_path, "wb") as f:
              f.write(decompressed)
          print("Extracting tar")
          with tarfile.open(tar_path) as tar:
              for member in tar.getmembers():
                  if member.name.endswith(".dll"):
                      member.name = os.path.basename(member.name)
                      tar.extract(member, dest)
                      print(f"  Extracted: {member.name}")
          for dll in glob.glob(os.path.join(dest, "*.dll")):
              print(f"  DLL: {os.path.basename(dll)}")

      - name: Configure bundle resources (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.bundle.resources = @{ "target/release/*.dll" = "./" }
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: ${{ contains(matrix.platform, 'macos') && '12.0' || '' }}
          CMAKE_OSX_DEPLOYMENT_TARGET: ${{ contains(matrix.platform, 'macos') && '12.0' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Folder Search ${{ github.ref_name }}'
          releaseBody: 'See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
